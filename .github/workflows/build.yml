name: Build WaveController.exe
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pygetwindow pystray pillow

      - name: Build the exe
        run: |
          python -m PyInstaller --onefile --windowed --name "WaveController" --clean wavefix.py

      - name: Upload the exe as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaveController-windows-exe
          path: dist/WaveController.exe
